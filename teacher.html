<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>교사 대시보드 — 특허 명세서 메이커</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧑‍🏫</text></svg>">
<style>
  :root { --navy: #1e2a4a; --navy2: #2c3e6b; --amber: #f5a623; --bg: #f4f6fa; --line: #d8dee9; --ok: #2e9e5b; --danger: #d9534f; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "맑은 고딕", "Malgun Gothic", sans-serif; background: var(--bg); color: #222; font-size: 17px; }
  button { font-family: inherit; cursor: pointer; border: none; border-radius: 8px; }
  input { font-family: inherit; font-size: 17px; border: 2px solid var(--line); border-radius: 8px; padding: 9px 12px; }
  input:focus { outline: none; border-color: var(--navy2); }
  .hidden { display: none !important; }

  /* 로그인 */
  #lock { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--navy), var(--navy2)); }
  .lock-card { background: #fff; border-radius: 18px; padding: 40px 44px; width: 420px; text-align: center; }
  .lock-card h1 { font-size: 23px; color: var(--navy); margin-bottom: 20px; }
  .lock-card input { width: 100%; font-size: 20px; text-align: center; }
  .lock-card button { width: 100%; margin-top: 16px; background: var(--amber); color: #fff; font-size: 19px; font-weight: bold; padding: 13px; }
  #lockMsg { color: var(--danger); font-size: 14px; margin-top: 12px; min-height: 20px; }

  /* 대시보드 */
  #dash { display: flex; flex-direction: column; height: 100vh; }
  header { background: var(--navy); color: #fff; display: flex; align-items: center; padding: 12px 24px; gap: 14px; }
  header h1 { font-size: 20px; }
  header .sub { font-size: 14px; opacity: .7; }
  main { flex: 1; display: flex; gap: 16px; padding: 16px 20px; overflow: hidden; }
  .col { background: #fff; border: 1px solid var(--line); border-radius: 14px; display: flex; flex-direction: column; overflow: hidden; }
  .col h2 { font-size: 18px; color: var(--navy); padding: 14px 18px; border-bottom: 1px solid var(--line); }
  #colCodes { width: 460px; flex-shrink: 0; }
  #colStudents { flex: 1; }
  .col-body { flex: 1; overflow-y: auto; padding: 14px 18px; }

  /* 코드 만들기 */
  #newCode { display: flex; gap: 8px; margin-bottom: 14px; }
  #newCode input { flex: 1; }
  #newCode button { background: var(--navy2); color: #fff; font-weight: bold; padding: 0 18px; font-size: 16px; }

  /* 코드 카드 */
  .code-card { border: 2px solid var(--line); border-radius: 12px; padding: 13px 15px; margin-bottom: 10px; cursor: pointer; }
  .code-card.sel { border-color: var(--navy2); background: #f6f8fd; }
  .code-card .top { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .code-card .name { font-size: 20px; font-weight: bold; color: var(--navy); letter-spacing: 1px; }
  .code-card .badge { font-size: 12.5px; padding: 3px 9px; border-radius: 20px; font-weight: bold; }
  .b-on { background: #e7f3ec; color: var(--ok); }
  .b-off { background: #f6e8e7; color: var(--danger); }
  .toggles { display: flex; gap: 8px; }
  .toggles button { flex: 1; font-size: 14.5px; font-weight: bold; padding: 9px 6px; border: 2px solid var(--line); background: #fff; color: #667; }
  .toggles button.act { border-color: var(--ok); background: #e7f3ec; color: var(--ok); }
  .toggles button.warn { border-color: var(--danger); background: #f6e8e7; color: var(--danger); }

  /* 학생 표 */
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 11px 12px; border-bottom: 1px solid #eef1f5; text-align: left; font-size: 16px; }
  th { color: var(--navy); font-size: 14.5px; background: #f8fafc; position: sticky; top: 0; }
  tr.stu { cursor: pointer; }
  tr.stu:hover { background: #f6f8fd; }
  .empty { color: #99a; text-align: center; padding: 40px 0; font-size: 16px; }

  /* 학생 상세 모달 */
  #modalWrap { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
  #modal { background: #fff; border-radius: 14px; width: min(980px, 94vw); height: 86vh; display: flex; flex-direction: column; overflow: hidden; }
  #modal .m-head { display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--line); }
  #modal .m-head b { font-size: 19px; color: var(--navy); }
  #modal .m-head button { margin-left: auto; background: #eef1f6; font-size: 15px; padding: 8px 16px; }
  #modal .m-body { flex: 1; display: flex; overflow: hidden; }
  #mDraft { flex: 1; overflow-y: auto; padding: 16px 20px; border-right: 1px solid var(--line); }
  #mLog { flex: 1.1; overflow-y: auto; padding: 16px 20px; background: #fafbfd; }
  .d-item { margin-bottom: 14px; }
  .d-item b { display: block; color: var(--navy); font-size: 15px; margin-bottom: 3px; }
  .d-item p { font-size: 15.5px; line-height: 1.6; white-space: pre-wrap; color: #333; }
  .d-item p.none { color: #bbb; }
  .ev { margin-bottom: 14px; }
  .ev .q { background: var(--navy2); color: #fff; border-radius: 12px 12px 4px 12px; padding: 9px 13px; font-size: 14.5px; line-height: 1.5; margin-left: 40px; white-space: pre-wrap; }
  .ev .a { background: #fff; border: 1px solid var(--line); border-radius: 12px 12px 12px 4px; padding: 9px 13px; font-size: 14.5px; line-height: 1.55; margin-right: 40px; margin-top: 6px; white-space: pre-wrap; }
  .ev .meta { font-size: 12px; color: #99a; margin: 3px 4px; }
  .ev.ocr .a { background: #fdf8ec; }
</style>
</head>
<body>

<!-- 비밀번호 -->
<section id="lock">
  <div class="lock-card">
    <h1>🧑‍🏫 교사 대시보드</h1>
    <input id="pw" type="password" placeholder="비밀번호" autocomplete="off">
    <button id="btnLogin">들어가기</button>
    <div id="lockMsg"></div>
  </div>
</section>

<!-- 대시보드 -->
<section id="dash" class="hidden">
  <header>
    <h1>🧑‍🏫 특허 명세서 메이커 — 교사 대시보드</h1>
    <span class="sub">학생 화면: /  ·  출원 체험: /office.html</span>
  </header>
  <main>
    <div class="col" id="colCodes">
      <h2>활동코드</h2>
      <div class="col-body">
        <div id="newCode">
          <input id="ncName" placeholder="새 코드 (예: 5반발명)" maxlength="12" autocomplete="off">
          <button id="btnNew">＋ 발급</button>
        </div>
        <div id="codeList"><div class="empty">불러오는 중...</div></div>
      </div>
    </div>
    <div class="col" id="colStudents">
      <h2 id="stuTitle">학생 활동 — 코드를 선택하세요</h2>
      <div class="col-body" id="stuBody">
        <div class="empty">왼쪽에서 활동코드를 누르면 학생 목록이 나와요.</div>
      </div>
    </div>
  </main>
</section>

<!-- 학생 상세 -->
<div id="modalWrap" class="hidden">
  <div id="modal">
    <div class="m-head"><b id="mName"></b><button onclick="closeModal()">닫기 ✕</button></div>
    <div class="m-body">
      <div id="mDraft"></div>
      <div id="mLog"></div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let PW = sessionStorage.getItem('tpw') || '';
let codes = [], selCode = null;

async function api(action, body = {}) {
  const r = await fetch('/api/teacher', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: PW, action, ...body })
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.error || '오류가 났습니다.');
  return j;
}

// ---------- 로그인 ----------
$('#pw').focus();
$('#pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
$('#btnLogin').addEventListener('click', login);
async function login() {
  PW = $('#pw').value;
  try {
    await api('login');
    sessionStorage.setItem('tpw', PW);
    $('#lock').classList.add('hidden');
    $('#dash').classList.remove('hidden');
    loadCodes();
  } catch (e) { $('#lockMsg').textContent = e.message; }
}
if (PW) { $('#pw').value = PW; login(); }

// ---------- 코드 목록 ----------
async function loadCodes() {
  try {
    codes = (await api('codes')).codes;
    renderCodes();
  } catch (e) { $('#codeList').innerHTML = `<div class="empty">${e.message}</div>`; }
}
function renderCodes() {
  if (!codes.length) { $('#codeList').innerHTML = '<div class="empty">아직 코드가 없어요.<br>위에서 첫 코드를 발급해 보세요.</div>'; return; }
  $('#codeList').innerHTML = codes.map(c => `
    <div class="code-card ${selCode === c.code ? 'sel' : ''}" data-code="${c.code}">
      <div class="top">
        <span class="name">${c.code}</span>
        <span class="badge ${c.active ? 'b-on' : 'b-off'}">${c.active ? '활동 중' : '마감됨'}</span>
        <span class="badge ${c.officeOpen ? 'b-on' : 'b-off'}">출원 체험 ${c.officeOpen ? '열림 🔓' : '잠김 🔒'}</span>
      </div>
      <div class="toggles">
        <button data-act="active">${c.active ? '활동 마감하기' : '다시 열기'}</button>
        <button data-act="office" class="${c.officeOpen ? 'warn' : 'act'}">${c.officeOpen ? '출원 체험 잠그기 🔒' : '출원 체험 열기 🔓'}</button>
      </div>
    </div>`).join('');
  document.querySelectorAll('.code-card').forEach(card => {
    const code = card.dataset.code;
    card.addEventListener('click', () => selectCode(code));
    card.querySelectorAll('.toggles button').forEach(b => b.addEventListener('click', async e => {
      e.stopPropagation();
      const c = codes.find(x => x.code === code);
      const patch = b.dataset.act === 'active' ? { active: !c.active } : { officeOpen: !c.officeOpen };
      b.disabled = true;
      try { await api('setCode', { code, ...patch }); await loadCodes(); }
      catch (err) { alert(err.message); b.disabled = false; }
    }));
  });
}

// ---------- 코드 발급 ----------
$('#ncName').addEventListener('keydown', e => { if (e.key === 'Enter') $('#btnNew').click(); });
$('#btnNew').addEventListener('click', async () => {
  const code = $('#ncName').value.trim();
  if (!code) { $('#ncName').focus(); return; }
  $('#btnNew').disabled = true;
  try { await api('createCode', { code }); $('#ncName').value = ''; await loadCodes(); }
  catch (e) { alert(e.message); }
  finally { $('#btnNew').disabled = false; }
});

// ---------- 학생 목록 ----------
async function selectCode(code) {
  selCode = code;
  renderCodes();
  $('#stuTitle').textContent = `학생 활동 — ${code}`;
  $('#stuBody').innerHTML = '<div class="empty">불러오는 중...</div>';
  try {
    const { students } = await api('students', { code });
    if (!students.length) { $('#stuBody').innerHTML = '<div class="empty">아직 입장한 학생이 없어요.</div>'; return; }
    $('#stuBody').innerHTML = `<table><thead><tr><th>별명</th><th>발명품 이름</th><th>AI 질문</th><th>마지막 활동</th></tr></thead><tbody>` +
      students.map(s => `<tr class="stu" data-sid="${s.sessionId}" data-nick="${s.nickname}">
        <td><b>${s.nickname}</b></td>
        <td>${(s.draft && s.draft.title) || '<span style="color:#bbb">아직 없음</span>'}</td>
        <td>${s.chatCount}회</td>
        <td>${s.lastActive ? new Date(s.lastActive).toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '-'}</td>
      </tr>`).join('') + '</tbody></table>';
    window._students = students;
    document.querySelectorAll('tr.stu').forEach(tr => tr.addEventListener('click', () => openStudent(tr.dataset.sid, tr.dataset.nick)));
  } catch (e) { $('#stuBody').innerHTML = `<div class="empty">${e.message}</div>`; }
}

// ---------- 학생 상세 ----------
const FIELD_NAMES = { title: '발명의 명칭', problem: '배경·해결하려는 과제', solution: '과제의 해결 수단', effect: '발명의 효과', core: '청구범위' };
async function openStudent(sid, nick) {
  $('#mName').textContent = `${nick} 학생의 기록`;
  const s = (window._students || []).find(x => x.sessionId === sid);
  const d = (s && s.draft) || {};
  $('#mDraft').innerHTML = '<h3 style="color:var(--navy); margin-bottom:12px">📝 명세서 초안</h3>' +
    Object.entries(FIELD_NAMES).map(([k, name]) =>
      `<div class="d-item"><b>${name}</b><p class="${d[k] ? '' : 'none'}">${d[k] || '(아직 안 씀)'}</p></div>`).join('');
  $('#mLog').innerHTML = '<div class="empty">기록 불러오는 중...</div>';
  $('#modalWrap').classList.remove('hidden');
  try {
    const { events } = await api('events', { sessionId: sid });
    if (!events.length) { $('#mLog').innerHTML = '<div class="empty">아직 AI 사용 기록이 없어요.</div>'; return; }
    $('#mLog').innerHTML = '<h3 style="color:var(--navy); margin-bottom:12px">🤖 AI 사용 기록 (전체)</h3>' + events.map(ev => {
      const t = ev.ts ? new Date(ev.ts).toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';
      if (ev.type === 'chat') return `<div class="ev"><div class="q">${esc(ev.question)}</div><div class="a">${esc(ev.answer)}</div><div class="meta">${t}</div></div>`;
      if (ev.type === 'ocr') return `<div class="ev ocr"><div class="a">📷 활동지 OCR 인식<br><span style="color:#777; font-size:13px">${esc((ev.rawText || '').slice(0, 400))}</span></div><div class="meta">${t}</div></div>`;
      return '';
    }).join('');
  } catch (e) { $('#mLog').innerHTML = `<div class="empty">${e.message}</div>`; }
}
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function closeModal() { $('#modalWrap').classList.add('hidden'); }
$('#modalWrap').addEventListener('click', e => { if (e.target.id === 'modalWrap') closeModal(); });
</script>
</body>
</html>
